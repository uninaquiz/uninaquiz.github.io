<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkpoint Quiz</title>
    <link rel="icon" href="/assets/favicon-robot.png" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            screens: { xs: "375px" },
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
              title: ['Orbitron', 'sans-serif'],
            },
            colors: {
              brand: {
                bg: '#0B132B',
                bg2: '#0f1d40',
                surface: '#121e3d',
                surface2: '#1a2850',
                border: '#1e3060',
                green: '#00FF87',
                'green-dim': '#00cc6a',
              }
            }
          },
        },
      };
    </script>
    <style>
      * { box-sizing: border-box; }
      body {
        background-color: #0B132B;
        color: #ffffff;
        font-family: 'Montserrat', sans-serif;
      }
      body::before {
        content: '';
        position: fixed; inset: 0;
        background-image: 
          linear-gradient(rgba(0,255,135,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,255,135,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0B132B; }
      ::-webkit-scrollbar-thumb { background: #1e3060; border-radius: 3px; }
      .clip-chamfer {
        clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      }
      .clip-chamfer-sm {
        clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
      }
      .green-glow { box-shadow: 0 0 20px rgba(0,255,135,0.2); }
      .top-line::before {
        content: '';
        position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, transparent, #00FF87, transparent);
      }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      @keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
      @keyframes spin { to{transform:rotate(360deg)} }
      @keyframes confettiFall {
        0%{transform:translateY(-20px) rotate(0deg);opacity:1}
        100%{transform:translateY(110vh) rotate(720deg);opacity:0}
      }
      .animate-float { animation: float 3s ease-in-out infinite; }
      .animate-fade-in-up { animation: fadeInUp 0.4s ease; }
      .loader-ring {
        width: 48px; height: 48px;
        border: 3px solid #1e3060;
        border-top-color: #00FF87;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
